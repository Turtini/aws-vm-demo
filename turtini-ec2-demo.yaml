AWSTemplateFormatVersion: '2010-09-09'
Description: Turtini Training Loop EC2 Demo with auto-terminate

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium

  AutoTerminateMinutes:
    Type: Number
    Default: 240
    MinValue: 30
    MaxValue: 1440
    Description: Minutes before the demo instance shuts down and terminates itself

Resources:
  TurtiniDemoInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c02fb55956c7d316
      InstanceType: !Ref InstanceType
      InstanceInitiatedShutdownBehavior: terminate
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          shutdown -h +${AutoTerminateMinutes}
      Tags:
        - Key: Name
          Value: turtini-demo-vm
        - Key: Project
          Value: TurtiniTraining
        - Key: Environment
          Value: Demo

Outputs:
  InstanceId:
    Value: !Ref TurtiniDemoInstance
